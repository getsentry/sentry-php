name: Code style and static analysis

on:
  pull_request:
  push:
    branches:
      - master
      - release/**

permissions:
  contents: read

jobs:
  php-cs-fixer:
    name: PHP-CS-Fixer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'

      - name: Resolve dependencies
        run: composer update --no-progress --no-interaction --prefer-dist --no-install --no-plugins --no-scripts --no-audit

      - name: Audit dependencies
        run: composer audit --locked --no-interaction --format=summary

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --no-plugins --no-scripts

      - name: Run script
        run: vendor/bin/php-cs-fixer fix --verbose --diff --dry-run

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'

      - name: Resolve dependencies
        run: composer update --no-progress --no-interaction --prefer-dist --no-install --no-plugins --no-scripts --no-audit

      - name: Audit dependencies
        run: composer audit --locked --no-interaction --format=summary

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --no-plugins --no-scripts

      - name: Run script
        run: vendor/bin/phpstan analyse

  mago:
    name: Mago
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'

      - name: Resolve dependencies
        run: composer update --no-progress --no-interaction --prefer-dist --no-install --no-plugins --no-scripts --no-audit

      - name: Audit dependencies
        run: composer audit --locked --no-interaction --format=summary

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --no-plugins --no-scripts

      - name: Run script
        run: composer mago
