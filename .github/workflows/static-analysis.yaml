name: Code style and static analysis

on:
  pull_request:
  push:
    branches:
      - master
      - release/**

permissions:
  contents: read

jobs:
  php-cs-fixer:
    name: PHP-CS-Fixer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'

      - name: Resolve dependencies
        run: composer update --no-progress --no-interaction --prefer-dist --no-install --no-plugins --no-scripts --no-audit

      - name: Audit dependencies
        run: composer audit --locked --no-interaction --format=table

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --no-plugins --no-scripts

      - name: Run script
        run: vendor/bin/php-cs-fixer fix --verbose --diff --dry-run

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'

      - name: Resolve dependencies
        run: composer update --no-progress --no-interaction --prefer-dist --no-install --no-plugins --no-scripts --no-audit

      - name: Audit dependencies
        run: composer audit --locked --no-interaction --format=table

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --no-plugins --no-scripts

      - name: Run script
        run: vendor/bin/phpstan analyse

  mago:
    name: Mago
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'

      - name: Resolve dependencies
        run: composer update --no-progress --no-interaction --prefer-dist --no-install --no-plugins --no-scripts --no-audit

      - name: Audit dependencies
        run: composer audit --locked --no-interaction --format=table

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --no-plugins --no-scripts

      - name: Run script
        run: composer mago
